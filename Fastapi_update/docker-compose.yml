services:
  redis:
    image: redis:7-alpine
    container_name: realtime_prod_demo_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: realtime_prod_demo_postgres
    environment:
      POSTGRES_DB: realtime_demo
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
